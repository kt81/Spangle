Spangle:
  Rtmp:
    Enabled: true
    Port: 1935
    # AudioOnlyFallbackMs: 3000  # audio with no video in sight becomes audio-only (0 = off)
    # TimedMetadata: true        # AMF data events -> timed ID3 in the HLS output
    # Tls:                       # RTMPS (publishers connect with rtmps://)
    #   Enabled: true
    #   CertificatePath: cert.pfx        # PKCS#12; or a PEM cert with KeyPath
    #   CertificatePassword: ""
    #   KeyPath: cert.key                # set for a PEM cert/key pair
  Srt:
    Enabled: true
    Port: 9998
    # Passphrase: "correct horse battery staple"  # optional wire encryption (10-79 bytes)
  # Moq:
  #   # MOQT egress: every publish session is additionally announced to a relay and
  #   # published as LOC frames with an MSF catalog, beside the HLS output. A stream's
  #   # namespace is NamespaceRoot + / + its stream key (e.g. live/test), which is what a
  #   # browser player is pointed at.
  #   Enabled: true
  #   Relay: 127.0.0.1:4433            # address:port of the MOQT relay (raw QUIC)
  #   NamespaceRoot: live              # empty = the stream key alone is the namespace
  #   # Path: /moq                     # the relay's endpoint path
  #   # TargetHost: localhost          # SNI, when the relay's certificate needs one
  #   # AllowUntrustedRelayCertificate: true   # development relays only
  #   Ingest:                          # pull sources: dial a relay and republish as HLS
  #     - Name: pulled                 # stream key -> /hls/pulled/playlist.m3u8
  #       Relay: 172.17.133.231:4433
  #       Namespace: live/test         # the namespace another publisher produces
  #       # Loc: Draft01               # the LOC draft the source publishes in
  #       # ReconnectDelay: "00:00:05"
  #       # ReadTimeout: "00:00:30"    # no media for this long -> redial ("00:00:00" disables)
  #       # KeepAliveInterval: "00:00:10"  # PING cadence while the publisher is silent
  # Rtsp:
  #   # Pull ingest: Spangle connects out to each source (IP cameras, other RTSP
  #   # servers) and republishes it under Name. TCP-interleaved transport.
  #   Enabled: true
  #   Sources:
  #     - Name: camera1                # stream key -> /hls/camera1/playlist.m3u8
  #       Url: rtsp://user:pass@192.168.1.10:554/stream1
  #       # UserName: admin            # credentials, if not embedded in Url
  #       # Password: secret
  #       # Dialect: LegacyOptionsKeepalive   # for firmwares without GET_PARAMETER
  #       # Transport: Tcp             # Tcp (interleaved; default) or Udp (own sockets)
  #       # ReconnectMaxDelaySeconds: 30
  #   Listen:                          # RTSP push server (clients ANNOUNCE/RECORD to us)
  #     Enabled: true                  # e.g. ffmpeg -f rtsp rtsp://host:8554/live/key
  #     Port: 8554                     # the stream key is the URL path; TCP or UDP accepted
  #     # Tls: { Enabled: true, CertificatePath: cert.pfx }   # RTSPS
  Http:
    Port: 8080
    # MetadataInjection: true       # opt-in (off by default): POST /api/streams/{key}/metadata ->
    #                               # timed ID3 in the output. On a public port set the token below.
    # MetadataInjectionToken: ""    # Bearer token for metadata injection on this public port
    # Tls:                          # HTTPS for HLS/DASH delivery (same shape as Rtmp.Tls)
    #   Enabled: true
    #   CertificatePath: cert.pfx
  Management:
    # The control API (and web console) listens on its own port, never on the
    # delivery port. Binding beyond loopback requires Token.
    Enabled: true
    Port: 8081
    # BindAddress: 127.0.0.1   # e.g. 0.0.0.0 to manage remotely (Token required)
    # Token: ""                # Bearer token for every /api/manage request
    # Tls:                     # HTTPS here keeps the token off the wire in cleartext
    #   Enabled: true
    #   CertificatePath: cert.pfx
  # Publish:
  #   AllowedStreamNames:      # exact-match allowlist for publishers (RTMP name /
  #     - my-stream-key        # SRT streamid); empty = allow all. A custom
  #     - another-key          # IPublishAuthorizer in DI overrides this entirely.
  Hls:
    Enabled: true
    # Storage: Memory  # "Memory" (default): the live window is served from process
    #                  # memory, nothing touches disk. "File": segments persist under
    #                  # OutputDirectory and double as an archive.
    OutputDirectory: hls-out
    RequestPath: /hls
    TargetSegmentDuration: 2.0
    # PlaylistWindow: 6  # segments kept in the live playlist; larger windows give
    #                    # rewind and make LL-HLS delta updates (?_HLS_skip=YES) pay off
    # TsPassthrough: true  # SRT→TS-HLS re-segments the source TS as-is (half the
    #                      # container work); set false to force demux+remux, e.g.
    #                      # when MediaFrame spinner plugins must run on SRT sessions
    # EndedStreamTtlSeconds: 300  # memory storage frees an ended stream's final window
    #                             # after this long (0 = keep until the key publishes again)
