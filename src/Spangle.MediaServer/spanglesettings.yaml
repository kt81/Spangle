Spangle:
  Rtmp:
    Enabled: true
    Port: 1935
  Srt:
    Enabled: true
    Port: 9998
    # Passphrase: "correct horse battery staple"  # optional wire encryption (10-79 bytes)
  Http:
    Port: 8080
  Hls:
    Enabled: true
    OutputDirectory: hls-out
    RequestPath: /hls
    TargetSegmentDuration: 2.0
    # TsPassthrough: true  # SRT→TS-HLS re-segments the source TS as-is (half the
    #                      # container work); set false to force demux+remux, e.g.
    #                      # when MediaFrame spinner plugins must run on SRT sessions
